services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env.development
        required: true
      - path: .env.keys
        required: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # The app runs on 8000 inside the container
    expose:
      - "8000"

  dev-gui:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env.development
        required: true
      - path: .env.keys
        required: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    command: [ "python", "scripts/dev_gui.py", "--base-url", "http://app:8000" ]
    depends_on:
      - app

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
