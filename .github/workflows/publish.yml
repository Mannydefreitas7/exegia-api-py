name: Publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # e.g. v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-*" # e.g. v1.2.3-rc1

  pull_request:
    types: [closed]
    branches: [master, main]

# ── jobs ──────────────────────────────────────────────────────────────────────

jobs:
  # Runs only when a PR is merged. Bumps the patch version, commits back to the
  # base branch with [skip ci], and pushes a vX.Y.Z tag to trigger the release.
  bump:
    name: Bump version
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Bump version
        id: bump
        shell: bash
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          TAG="v$NEW_VERSION"

          sed -i "s/version = \"$VERSION\"/version = \"$NEW_VERSION\"/" pyproject.toml
          sed -i "s/__version__ = \"$VERSION\"/__version__ = \"$NEW_VERSION\"/" src/exegia/__init__.py

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/exegia/__init__.py
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git tag "$TAG"
          git push origin HEAD:${{ github.event.pull_request.base.ref }}
          git push origin "$TAG"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Bumped $VERSION → $NEW_VERSION (tag $TAG)"

      - name: Add version label to PR
        shell: bash
        run: |
          gh label create "${{ steps.bump.outputs.tag }}" --color 0e8a16 --description "Released version" || true
          gh pr edit ${{ github.event.pull_request.number }} --add-label "${{ steps.bump.outputs.tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Builds the wheel. Runs after a successful bump, on a tag push, or on
  # workflow_dispatch. Skips entirely for PRs that were closed without merging.
  build:
    name: Build distribution
    needs: bump
    if: >-
      always() && (
        needs.bump.result == 'success' ||
        (needs.bump.result == 'skipped' && github.event_name != 'pull_request')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the newly-created tag when bump ran; otherwise the triggering ref.
          ref: ${{ needs.bump.outputs.tag || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build
        run: uv build --out-dir dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-to-pypi:
    name: >-
      Publish Python 🐍 distribution 📦 to PyPI
    if: startsWith(github.ref, 'refs/tags/') # only publish to PyPI on tag pushes
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/exegia-api-py # Replace <package-name> with your PyPI project name
    permissions:
      id-token: write # IMPORTANT: mandatory for trusted publishing
