name: 'Build Distribution'
description: 'Installs uv, builds the package, and uploads artifacts'
runs:
  using: 'composite'
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Build
      shell: bash
      run: uv build --out-dir dist/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        if-no-files-found: error
