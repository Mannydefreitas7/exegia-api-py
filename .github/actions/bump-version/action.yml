name: 'Bump Version'
description: 'Bumps the version in pyproject.toml and __init__.py, commits, and tags'
inputs:
  github_token:
    description: 'GitHub Token'
    required: true
  pr_number:
    description: 'Pull Request Number'
    required: true
outputs:
  tag:
    description: 'The new version tag'
    value: ${{ steps.bump.outputs.tag }}
runs:
  using: 'composite'
  steps:
    - name: Bump version
      id: bump
      shell: bash
      run: |
        VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
        NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
        TAG="v$NEW_VERSION"

        sed -i "s/version = \"$VERSION\"/version = \"$NEW_VERSION\"/" pyproject.toml
        sed -i "s/__version__ = \"$VERSION\"/__version__ = \"$NEW_VERSION\"/" src/exegia/__init__.py

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add pyproject.toml src/exegia/__init__.py
        git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
        git tag "$TAG"

        # Determine the base branch from the environment or use a default
        BASE_REF="${{ github.event.pull_request.base.ref }}"
        git push origin HEAD:$BASE_REF
        git push origin "$TAG"

        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "Bumped $VERSION → $NEW_VERSION (tag $TAG)"

    - name: Validate token permissions for PR labeling
      shell: bash
      run: |
        set -euo pipefail

        REPO="${{ github.repository }}"
        PR_NUMBER="${{ inputs.pr_number }}"

        if ! gh api "repos/$REPO" --jq '.permissions.push' >/dev/null 2>&1; then
          echo "::error::The provided github_token cannot access repository permissions. Workflows calling this action must grant 'permissions: issues: write' and 'permissions: pull-requests: write' to the job GITHUB_TOKEN."
          exit 1
        fi

        if [ "$(gh api "repos/$REPO" --jq '.permissions.push')" != "true" ]; then
          echo "::error::The provided github_token does not have write access to $REPO. The 'Add version label to PR' step requires job permissions 'issues: write' and 'pull-requests: write'."
          exit 1
        fi

        if ! gh api "repos/$REPO/pulls/$PR_NUMBER" --jq '.number' >/dev/null 2>&1; then
          echo "::error::The provided github_token cannot access pull request #$PR_NUMBER. Ensure the calling workflow grants 'permissions: pull-requests: write' and 'permissions: issues: write' to the job GITHUB_TOKEN."
          exit 1
        fi
      env:
        GH_TOKEN: ${{ inputs.github_token }}

    - name: Add version label to PR
      shell: bash
      run: |
        gh label create "${{ steps.bump.outputs.tag }}" --color 0e8a16 --description "Released version" || true
        gh pr edit ${{ inputs.pr_number }} --add-label "${{ steps.bump.outputs.tag }}"
      env:
        GH_TOKEN: ${{ inputs.github_token }}
