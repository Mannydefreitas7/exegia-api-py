[project]
name = "graphql"
version = "0.1.0"
description = "Strawberry GraphQL layer over Context-Fabric corpora"
readme = "README.md"
authors = [
    { name = "Emmanuel De Freitas", email = "manny.defreitas7@me.com" }
]
requires-python = ">=3.12"
dependencies = [
    "strawberry-graphql>=0.314.0",
    "context-fabric>=0.1.0",
]

[project.scripts]
graphql = "graphql:main"

[build-system]
requires = ["uv_build>=0.9.18,<0.10.0"]
build-backend = "uv_build"
